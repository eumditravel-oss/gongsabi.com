<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="utf-8" />
        <title>공사비닷컴 관리자 로그인</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta content="공사비닷컴 관리자 페이지" name="description" />
        <meta content="공사비닷컴" name="author" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />

        <!-- App favicon -->
        <link rel="shortcut icon" href="javascript:alert('준비중입니다.');">

        <!-- App css -->
        <link href="javascript:alert('준비중입니다.');" rel="stylesheet" type="text/css" />
        <link href="javascript:alert('준비중입니다.');" rel="stylesheet" type="text/css" />
        <link href="javascript:alert('준비중입니다.');" rel="stylesheet" type="text/css" />

    </head>

    <body>

        <div class="account-pages mt-5 mb-5">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-md-8 col-lg-6 col-xl-5">
                        <div class="card">

                            <div class="card-body p-4">

                                <div class="text-center w-75 m-auto">
                                    <a href="/admin">
                                        <span><img src="/static/img/logo.png" alt="" style="width:250px;"></span>
                                    </a>
                                    <p class="text-muted mb-4 mt-3">관리자 페이지 로그인</p>
                                </div>

                                <form method="post" action="/admin/auth/login_proc">

                                    <div class="form-group mb-3">
                                        <label for="admin_member_id">아이디(이메일)</label>
                                        <input class="form-control" type="email" id="admin_member_id" name="admin_member_id" placeholder="아이디(이메일)" required="true">
                                    </div>

                                    <div class="form-group mb-3">
                                        <label for="admin_member_password">비밀번호</label>
                                        <input class="form-control" type="password" id="admin_member_password" name="admin_member_password" placeholder="비밀번호" required="true">
                                    </div>

                                    <div class="form-group mb-3">
                                        <div class="custom-control custom-checkbox">
                                            <input type="checkbox" class="custom-control-input" id="checkbox-signin" checked="true">
                                            <label class="custom-control-label" for="checkbox-signin">기억하기</label>
                                        </div>
                                    </div>

                                    <div class="form-group mb-0 text-center">
                                        <button class="btn btn-primary btn-block" type="submit">로그인</button>
                                    </div>

                                </form>

                            </div> <!-- end card-body -->
                        </div>
                        <!-- end card -->

                        <div class="row mt-3">
                            <div class="col-12 text-center">
                                <p> <a href="javascript:alert('준비중입니다.');" class="text-muted ml-1">비밀번호 찾기</a></p>
                                <!-- <p class="text-muted">Don't have an account? <a href="javascript:alert('준비중입니다.');" class="text-primary font-weight-medium ml-1">Sign Up</a></p> -->
                            </div> <!-- end col -->
                        </div>
                        <!-- end row -->

                    </div> <!-- end col -->
                </div>
                <!-- end row -->
            </div>
            <!-- end container -->
        </div>
        <!-- end page -->


        <footer class="footer footer-alt">
            2020 &copy; 공사비닷컴
        </footer>

        <!-- Vendor js -->
        <script src="/static/admin/assets/js/vendor.min.js"></script>

        <!-- App js -->
        <script src="/static/admin/assets/js/app.min.js"></script>

        <script>
        $(function() {
            $('#admin_member_id').focus();
        });
        </script>


    </body>
</html>

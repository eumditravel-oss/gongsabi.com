<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="utf-8" />
        <title>공사비닷컴 관리자 로그인</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta content="공사비닷컴 관리자 페이지" name="description" />
        <meta content="공사비닷컴" name="author" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />

        <!-- App favicon -->
        <link rel="shortcut icon" href="../../public/static/img/favicon.ico">

        <!-- App css -->
        <link href="../../public/static/admin/assets/css/bootstrap.min.css" rel="stylesheet" type="text/css" />
        <link href="../../public/static/admin/assets/css/icons.min.css" rel="stylesheet" type="text/css" />
        <link href="../../public/static/admin/assets/css/app.min.css" rel="stylesheet" type="text/css" />

        <!-- Inject Admin Required CDNs -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/4.6.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css">
    <link rel="stylesheet" href="../../public/static/css/admin/static-preview.css">
</head>

    <body>
    <div class="static-admin-note">정적 미리보기입니다. 버튼과 저장 동작은 비활성화되어 있습니다.</div>

        <div class="account-pages mt-5 mb-5">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-md-8 col-lg-6 col-xl-5">
                        <div class="card">

                            <div class="card-body p-4">

                                <div class="text-center w-75 m-auto">
                                    <a href="../../admin/dashboard/">
                                        <span><img src="../../public/static/img/logo.png" alt="" style="width:250px;"></span>
                                    </a>
                                    <p class="text-muted mb-4 mt-3">관리자 페이지 로그인</p>
                                </div>

                                <form onsubmit="return false;" method="post" action="#">

                                    <div class="form-group mb-3">
                                        <label for="admin_member_id">아이디(이메일)</label>
                                        <input class="form-control" type="email" id="admin_member_id" name="admin_member_id" placeholder="아이디(이메일)" required="true">
                                    </div>

                                    <div class="form-group mb-3">
                                        <label for="admin_member_password">비밀번호</label>
                                        <input class="form-control" type="password" id="admin_member_password" name="admin_member_password" placeholder="비밀번호" required="true">
                                    </div>

                                    <div class="form-group mb-3">
                                        <div class="custom-control custom-checkbox">
                                            <input type="checkbox" class="custom-control-input" id="checkbox-signin" checked="true">
                                            <label class="custom-control-label" for="checkbox-signin">기억하기</label>
                                        </div>
                                    </div>

                                    <div class="form-group mb-0 text-center">
                                        <button class="btn btn-primary btn-block" type="submit">로그인</button>
                                    </div>

                                </form>

                            </div> <!-- end card-body -->
                        </div>
                        <!-- end card -->

                        <div class="row mt-3">
                            <div class="col-12 text-center">
                                <p> <a href="../../admin/auth/lost/" class="text-muted ml-1">비밀번호 찾기</a></p>
                                <!-- <p class="text-muted">Don't have an account? <a href="pages-register.html" class="text-primary font-weight-medium ml-1">Sign Up</a></p> -->
                            </div> <!-- end col -->
                        </div>
                        <!-- end row -->

                    </div> <!-- end col -->
                </div>
                <!-- end row -->
            </div>
            <!-- end container -->
        </div>
        <!-- end page -->


        <footer class="footer footer-alt">
            2020 &copy; 공사비닷컴
        </footer>

        <!-- Vendor js -->
        <script src="../../public/static/admin/assets/js/vendor.min.js"></script>

        <!-- App js -->
        <script src="../../public/static/admin/assets/js/app.min.js"></script>

        <script>
        $(function() {
            $('#admin_member_id').focus();
        });
        </script>


    </body>
</html>
